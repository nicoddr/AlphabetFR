<!DOCTYPE html>
<html lang="lt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magiška Abėcėlė ✨</title>
  <!-- Chargement de Tailwind CSS pour les styles -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            if: {
              blue: '#3558a2',
              red: '#E1000F'
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Animation de rebond subtil */
    @keyframes subtle-bounce {

      0%,
      100% {
        transform: translateY(-8px);
      }

      50% {
        transform: translateY(0);
      }
    }

    .animate-subtle {
      animation: subtle-bounce 2s infinite ease-in-out;
    }
  </style>
</head>

<body class="min-h-screen bg-white text-if-blue flex flex-col items-center py-4 px-4 font-sans text-center">

  <!-- Espace Header pour logo -->
  <header class="w-full flex flex-col sm:flex-row justify-between items-center sm:items-start mb-6 max-w-5xl">
    <div class="bg-white p-2 text-center sm:text-left">
      <!-- Remplacer le src par le vrai chemin du logo si disponible -->
      <img src="Logo IF.png" alt="Logo Institut français" class="h-14 md:h-20 object-contain mx-auto sm:mx-0"
        onerror="this.onerror=null; this.outerHTML='<div class=&quot;h-14 w-28 md:h-20 md:w-40 border-2 border-dashed border-gray-400 flex items-center justify-center text-gray-500 text-[10px] md:text-xs text-center mx-auto sm:mx-0&quot;>[Espace Logo]</div>';">
    </div>
    <div class="text-xs md:text-base font-medium text-if-blue mt-2 sm:mt-4 italic text-center sm:text-right">
      Introduction à la langue française
    </div>
  </header>

  <h1 class="text-3xl md:text-5xl font-extrabold text-if-blue mb-4 drop-shadow-md">
    Magiška Abėcėlė ✨
  </h1>
  <p class="text-base md:text-lg text-if-blue mb-6 font-medium">
    Paspauskite raidę, kad išgirstumėte!
  </p>

  <!-- Centrinė ekrano sritis -->
  <div id="display-area"
    class="h-64 w-full max-w-md bg-white rounded-3xl shadow-xl flex flex-col items-center justify-center mb-10 border-4 border-if-blue transition-all duration-300">
    <div class="text-6xl text-gray-200">
      ❓
    </div>
  </div>

  <!-- Raidžių tinklelis -->
  <div id="letters-grid"
    class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-7 gap-2 md:gap-4 max-w-4xl w-full">
    <!-- Les boutons seront insérés ici par le script -->
  </div>

  <!-- Žinutė, jei garsas neveikia -->
  <p id="warning" class="hidden mt-8 text-red-500 font-bold bg-white p-4 rounded-lg">
    Dėmesio: Garsas jūsų naršyklėje neveikia. Prašome naudoti naujesnę naršyklę, pvz., "Chrome" arba "Safari".
  </p>

  <!-- Footer avec réseaux sociaux -->
  <footer class="w-full mt-auto py-8 px-4 flex flex-col items-center">
    <div class="flex space-x-6 mb-4">
      <!-- Facebook -->
      <a href="https://www.facebook.com/prancuzuinstitutas/" target="_blank" rel="noopener noreferrer"
        class="text-if-blue hover:text-if-red transition-colors" title="Facebook">
        <svg class="h-7 w-7" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M22.675 0h-21.35C.597 0 0 .597 0 1.325v21.351C0 23.403.597 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.597 1.323-1.324V1.325C24 .597 23.403 0 22.675 0z" />
        </svg>
      </a>
      <!-- LinkedIn -->
      <a href="https://www.linkedin.com/company/iflituanie/" target="_blank" rel="noopener noreferrer"
        class="text-if-blue hover:text-if-red transition-colors" title="LinkedIn">
        <svg class="h-7 w-7" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
        </svg>
      </a>
      <!-- Instagram -->
      <a href="https://www.instagram.com/institut_francais_lituanie/" target="_blank" rel="noopener noreferrer"
        class="text-if-blue hover:text-if-red transition-colors" title="Instagram">
        <svg class="h-7 w-7" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
        </svg>
      </a>
      <!-- YouTube -->
      <a href="https://www.youtube.com/user/CCFdeVilnius/featured" target="_blank" rel="noopener noreferrer"
        class="text-if-blue hover:text-if-red transition-colors" title="YouTube">
        <svg class="h-7 w-7" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.377.55a3.016 3.016 0 0 0-2.122 2.136C0 8.07 0 12 0 12s0 3.93.501 5.814a3.016 3.016 0 0 0 2.122 2.136c1.872.55 9.377.55 9.377.55s7.505 0 9.377-.55a3.016 3.016 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
        </svg>
      </a>
    </div>
    <div class="text-sm font-medium text-gray-500">
      &copy; 2026 Institut français de Lituanie. Tous droits réservés.
    </div>
  </footer>

  <script>
    // Abėcėlės duomenys
    const alphabetData = [
      { letter: 'A', word: 'Ananas', ltWord: 'Ananasas', emoji: '🍍', color: 'bg-red-400' },
      { letter: 'B', word: 'Banane', ltWord: 'Bananas', emoji: '🍌', color: 'bg-blue-400' },
      { letter: 'C', word: 'Cirque', ltWord: 'Cirkas', emoji: '🎪', color: 'bg-green-400' },
      { letter: 'D', word: 'Dinosaure', ltWord: 'Dinozauras', emoji: '🦖', color: 'bg-yellow-400' },
      { letter: 'E', word: 'Écran', ltWord: 'Ekranas', emoji: '🖥️', color: 'bg-purple-400' },
      { letter: 'F', word: 'Football', ltWord: 'Futbolas', emoji: '⚽', color: 'bg-pink-400' },
      { letter: 'G', word: 'Girafe', ltWord: 'Žirafa', emoji: '🦒', color: 'bg-orange-400' },
      { letter: 'H', word: 'Hippopotame', ltWord: 'Hipopotamas', emoji: '🦛', color: 'bg-teal-400' },
      { letter: 'I', word: 'Igloo', ltWord: 'Iglu', emoji: '🧊', color: 'bg-indigo-400' },
      { letter: 'J', word: 'Jaguar', ltWord: 'Jaguaras', emoji: '🐆', color: 'bg-red-500' },
      { letter: 'K', word: 'Kangourou', ltWord: 'Kengūra', emoji: '🦘', color: 'bg-blue-500' },
      { letter: 'L', word: 'Léopard', ltWord: 'Leopardas', emoji: '🐆', color: 'bg-green-500' },
      { letter: 'M', word: 'Melon', ltWord: 'Melionas', emoji: '🍈', color: 'bg-yellow-500' },
      { letter: 'N', word: 'Nectarine', ltWord: 'Nektarinas', emoji: '🍑', color: 'bg-purple-500' },
      { letter: 'O', word: 'Omelette', ltWord: 'Omletas', emoji: '🍳', color: 'bg-pink-500' },
      { letter: 'P', word: 'Pingouin', ltWord: 'Pingvinas', emoji: '🐧', color: 'bg-orange-500' },
      { letter: 'Q', word: 'Quatre', ltWord: 'Keturi', emoji: '4️⃣', color: 'bg-teal-500' },
      { letter: 'R', word: 'Robot', ltWord: 'Robotas', emoji: '🤖', color: 'bg-indigo-500' },
      { letter: 'S', word: 'Soleil', ltWord: 'Saulė', emoji: '☀️', color: 'bg-red-400' },
      { letter: 'T', word: 'Tigre', ltWord: 'Tigras', emoji: '🐅', color: 'bg-blue-400' },
      { letter: 'U', word: 'Ukulélé', ltWord: 'Ukulelė', emoji: '🎸', color: 'bg-green-400' },
      { letter: 'V', word: 'Vanille', ltWord: 'Vanilė', emoji: '🍦', color: 'bg-yellow-400' },
      { letter: 'W', word: 'Wagon', ltWord: 'Vagonas', emoji: '🚃', color: 'bg-purple-400' },
      { letter: 'X', word: 'Xylophone', ltWord: 'Ksilofonas', emoji: '🎹', color: 'bg-pink-400' },
      { letter: 'Y', word: 'Yaourt', ltWord: 'Jogurtas', emoji: '🥣', color: 'bg-orange-400' },
      { letter: 'Z', word: 'Zèbre', ltWord: 'Zebras', emoji: '🦓', color: 'bg-teal-400' }
    ];

    let isReady = false;
    let isUnlocked = false;
    let preferredVoice = null;

    // Chercher et sélectionner la voix la plus naturelle disponible
    function loadVoices() {
      const voices = window.speechSynthesis.getVoices();
      const frenchVoices = voices.filter(v => v.lang.startsWith('fr-') || v.lang === 'fr-FR');

      if (frenchVoices.length > 0) {
        // On essaie de trouver une voix de meilleure qualité
        preferredVoice = frenchVoices.find(v => v.name.includes('Google')) ||
          frenchVoices.find(v => v.name.includes('Premium')) ||
          frenchVoices.find(v => v.name.includes('Natural')) ||
          frenchVoices.find(v => v.name.includes('Thomas')) ||
          frenchVoices[0]; // Voix par défaut sinon
      }
    }

    // Fonction pour "déverrouiller" l'audio sur mobile
    function unlockAudio() {
      if (isReady && !isUnlocked) {
        isUnlocked = true;
        const silent = new SpeechSynthesisUtterance(" ");
        silent.volume = 0;
        window.speechSynthesis.speak(silent);
        
        // Nettoyage des écouteurs une fois déverrouillé
        window.removeEventListener('touchstart', unlockAudio);
        window.removeEventListener('mousedown', unlockAudio);
        window.removeEventListener('click', unlockAudio);
        console.log("Audio unlocked");
      }
    }

    // Patikrinti kalbos sintezę
    window.onload = () => {
      if ('speechSynthesis' in window) {
        isReady = true;
        loadVoices();
        
        // Certaines navigations chargent les voix un peu plus tard
        if (speechSynthesis.onvoiceschanged !== undefined) {
          speechSynthesis.onvoiceschanged = loadVoices;
        }

        // Ajouter les écouteurs pour déverrouiller l'audio au premier geste
        window.addEventListener('touchstart', unlockAudio, { passive: true });
        window.addEventListener('mousedown', unlockAudio);
        window.addEventListener('click', unlockAudio);
      } else {
        document.getElementById('warning').classList.remove('hidden');
      }
      renderGrid();
    };

    // Garsas ir ekrano atnaujinimas
    function playSound(index) {
      const item = alphabetData[index];
      const displayArea = document.getElementById('display-area');

      // Atnaujinti centrinę sritį
      displayArea.innerHTML = `
                <div class="animate-subtle flex flex-col items-center">
                    <div class="text-7xl mb-2">${item.emoji}</div>
                    <div class="text-4xl font-black text-if-blue mb-1">${item.letter}</div>
                    <div class="text-3xl font-bold text-if-blue capitalize">${item.word}</div>
                    <div class="text-xl font-medium text-gray-500 italic mt-1">${item.ltWord}</div>
                </div>
            `;

      // Paleisti garsą prancūzų kalba
      if (isReady) {
        // On annule ce qui est en cours seulement si nécessaire
        if (window.speechSynthesis.speaking) {
          window.speechSynthesis.cancel();
        }

        // On crée l'énonciation
        // Utiliser toLowerCase() évite que iOS dise "majuscule"
        const textToSpeak = item.letter.toLowerCase();
        const utterance = new SpeechSynthesisUtterance(textToSpeak);

        utterance.lang = 'fr-FR';
        utterance.rate = 0.85; // Vitesse un peu plus naturelle
        utterance.pitch = 1.0; // Ton normal pour éviter l'effet "robot/dessin animé"

        // Utiliser la meilleure voix si trouvée
        if (preferredVoice) {
          utterance.voice = preferredVoice;
        }

        window.speechSynthesis.speak(utterance);
      }
    }

    // Sugeneruoti mygtukus
    function renderGrid() {
      const grid = document.getElementById('letters-grid');
      alphabetData.forEach((item, index) => {
        const btn = document.createElement('button');

        // Mygtukų stilius išlaikant Tailwind klases
        btn.className = `${item.color} text-white font-black text-2xl md:text-4xl h-14 md:h-20 rounded-xl md:rounded-2xl shadow-md transform transition-transform duration-200 hover:scale-110 active:scale-95 flex items-center justify-center border-b-4 border-black/20`;
        btn.innerText = item.letter;

        // Priskirti paspaudimo funkciją
        btn.onclick = () => playSound(index);
        grid.appendChild(btn);
      });
    }
  </script>
</body>

</html>
